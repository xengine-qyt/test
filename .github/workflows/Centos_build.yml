name: centos build workflows

on:
  push:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    container:
      image: quay.io/centos/centos:${{ matrix.stream }}
      options: --platform ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            artifact: x86-64
            version: 9
            stream: stream9
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            artifact: x86-64
            version: 10
            stream: stream10
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: Arm64
            version: 9
            stream: stream9
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: Arm64
            version: 10
            stream: stream10

    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v6
        with:
          ref: 'main'

      - name: Set TERM variable
        run: echo "TERM=xterm" >> $GITHUB_ENV
             
      - name: install env
        run: |
            dnf update -y
            dnf upgrade -y
            dnf install epel-release -y
            dnf config-manager --enable crb

      - name: make
        run: |
            dnf install mongo-c-driver-libs -y
            rpm -ql mongo-c-driver-libs