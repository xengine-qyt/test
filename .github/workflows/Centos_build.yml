name: centos build workflows

on:
  push:
    branches:
      - 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    container:
      image: quay.io/centos/centos:${{ matrix.stream }}
      options: --platform ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            artifact: x86-64
            version: 10
            stream: stream10

    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v6
        with:
          ref: 'main'

      - name: Set TERM variable
        run: echo "TERM=xterm" >> $GITHUB_ENV
             
      - name: install env
        run: |
            dnf install epel-release -y
            dnf install --nogpgcheck https://mirrors.rpmfusion.org/free/el/rpmfusion-free-release-10.noarch.rpm https://mirrors.rpmfusion.org/nonfree/el/rpmfusion-nonfree-release-10.noarch.rpm -y
            dnf config-manager --enable crb

      - name: make
        run: |
            dnf install mongo-c-driver-libs -y

            rpm -ql mongo-c-driver-libs
            ls -al /usr/lib64/