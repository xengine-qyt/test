name: ios build workflows

on:
  push:
    branches: 
      - main

permissions:
  contents: read
  
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v6

      - name: vcpkg dependency repository
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          path: vcpkg           

      
      - name: vcpkg install
        run: |
            brew install cmake ninja pkg-config autoconf nasm
            cd vcpkg
            export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
            export CMAKE_OSX_SYSROOT=$SDKROOT
            ./bootstrap-vcpkg.sh
            ./vcpkg install 'mongo-c-driver:arm64-ios' --overlay-triplets=vcpkg/triplets/community -- -DENABLE_SRV=OFF
      - name: Show vcpkg build logs on failure
        if: failure()
        run: |
          cat vcpkg/buildtrees/mongo-c-driver/config-arm64-ios-dbg-out.log || true
          cat vcpkg/buildtrees/mongo-c-driver/config-arm64-ios-dbg-err.log || true