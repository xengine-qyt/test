name: macos build workflows

on:
  push:
    branches:
      - 'main'
  
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v6
        with:
          ref: 'main'
        
      - name: Set TERM variable
        run: echo "TERM=xterm" >> $GITHUB_ENV

      - name: install xengine package
        run: |
            brew install mongo-c-driver@2 
            pkg-config --cflags mongoc2 
            
            echo -e "==============="
            brew config
            echo -e "==============="
            brew doctor
            echo -e "==============="

            brew --prefix mongo-c-driver@2
            ls $(brew --prefix mongo-c-driver@2)/include/
            
            