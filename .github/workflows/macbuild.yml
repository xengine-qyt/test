name: macos build workflows

on:
  push:
    branches:
      - 'main1'
  
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout main repository code
        uses: actions/checkout@v6
        with:
          ref: 'main'
        
      - name: Set TERM variable
        run: echo "TERM=xterm" >> $GITHUB_ENV

      - name: install xengine package
        run: |
            brew install mongo-c-driver@2
            brew info mongo-c-driver@2
            ls -al /opt/homebrew/include
            ls -al /opt/homebrew/include/mongo-c-driver
