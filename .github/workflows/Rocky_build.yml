name: rockylinux build workflows

on:
  push:
    branches:
      - main
  
jobs:
  build:
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux/rockylinux:${{ matrix.os_version }}
      options: --platform ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            artifact: x86-64
            os_version: 9
          - arch: amd64
            runner: ubuntu-24.04
            platform: linux/amd64
            artifact: x86-64
            os_version: 10
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: Arm64
            os_version: 9
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: Arm64
            os_version: 10  

    steps:
       # 检出您的主仓库代码
      - name: Checkout main repository code
        uses: actions/checkout@v6

      - name: Set TERM variable
        run: echo "TERM=xterm" >> $GITHUB_ENV
        
      - name: install library
        run: |
            dnf update -y
            dnf upgrade -y
            dnf install epel-release -y
            dnf config-manager --enable crb

      - name: make
        run: |
            dnf install mongo-c-driver-libs -y
            rpm -ql mongo-c-driver-libs